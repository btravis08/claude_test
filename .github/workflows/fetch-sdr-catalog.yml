name: fetch-sdr-catalog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Capture the SDR product catalog
        run: node scripts/fetch-sdr-catalog.mjs
      - name: Commit catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add design/sdr-catalog public/sdr
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Capture SDR product catalog (fetched via Actions)"
          git push
