name: probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verify production homepage is CMS-driven
        run: |
          curl -s https://sundayred.vercel.app/ -o home.html
          echo "=== product hrefs (count + sample) ==="
          grep -o 'href="/products/[^"]*"' home.html | sort | uniq | head -12
          grep -c 'href="/products/' home.html || true
          echo "=== sanity CDN images present? ==="
          grep -c 'cdn.sanity.io' home.html || true
