name: probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch homepage and inspect product links
        run: |
          curl -s https://sundayred.vercel.app/ -o home.html
          echo "=== all product hrefs ==="
          grep -o 'href="/products/[^"]*"' home.html | sort | uniq -c
          echo "=== anchors without product hrefs (# links) near titles ==="
          grep -o 'href="#"[^>]*' home.html | head -5
          echo "=== Presidio card context ==="
          grep -o '.\{300\}Presidio.\{100\}' home.html | head -4
