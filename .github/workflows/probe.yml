name: probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Test the revalidate endpoint
        run: |
          echo "=== wrong secret (expect 401) ==="
          curl -s -o /dev/null -w "%{http_code}\n" -X POST "https://sundayred.vercel.app/api/revalidate?secret=wrong"
          echo "=== correct secret (expect ok:true) ==="
          curl -s -X POST "https://sundayred.vercel.app/api/revalidate?secret=sdr-revalidate"
          echo ""
