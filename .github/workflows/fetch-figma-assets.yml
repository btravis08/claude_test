name: fetch-figma-assets

on:
  workflow_dispatch:
  push:
    branches:
      - claude/sanity-github-app-setup-x49xa8
    paths:
      - ".github/workflows/fetch-figma-assets.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Figma assets
        run: bash scripts/fetch-figma-assets.sh
      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/figma
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Add Figma design assets (fetched via Actions)"
          git push
